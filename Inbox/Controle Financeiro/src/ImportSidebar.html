<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; padding: 16px; background: #f8f9fa; color: #333; }
    h2 { font-size: 16px; margin-bottom: 12px; color: #1a1a2e; }
    .section { background: #fff; border-radius: 8px; padding: 14px; margin-bottom: 12px; border: 1px solid #e0e0e0; }
    .section h3 { font-size: 13px; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }

    .upload-area {
      border: 2px dashed #bbb; border-radius: 8px; padding: 20px; text-align: center;
      cursor: pointer; transition: all 0.2s; background: #fafafa;
    }
    .upload-area:hover { border-color: #4a90d9; background: #f0f7ff; }
    .upload-area.active { border-color: #27ae60; background: #f0fff4; }
    .upload-area p { font-size: 12px; color: #888; margin-top: 6px; }

    input[type="file"] { display: none; }

    .stat { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
    .stat .label { color: #666; }
    .stat .value { font-weight: 600; }
    .stat .value.green { color: #27ae60; }
    .stat .value.yellow { color: #f39c12; }
    .stat .value.red { color: #e74c3c; }
    .stat .value.gray { color: #999; }

    .divider { border-top: 1px solid #eee; margin: 8px 0; }

    .btn {
      display: block; width: 100%; padding: 10px; border: none; border-radius: 6px;
      font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: all 0.2s;
    }
    .btn-primary { background: #27ae60; color: #fff; }
    .btn-primary:hover { background: #219a52; }
    .btn-primary:disabled { background: #bbb; cursor: not-allowed; }
    .btn-secondary { background: #eee; color: #333; }
    .btn-secondary:hover { background: #ddd; }

    .result { padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 13px; }
    .result.success { background: #d4edda; border: 1px solid #c3e6cb; }
    .result.error { background: #f8d7da; border: 1px solid #f5c6cb; }

    .spinner { display: none; text-align: center; padding: 10px; }
    .spinner.active { display: block; }

    #preview, #resultado { display: none; }
  </style>
</head>
<body>

  <h2>📥 Importar Extrato</h2>

  <!-- Upload -->
  <div class="section">
    <h3>Arquivo</h3>
    <div class="upload-area" id="dropzone" onclick="document.getElementById('fileInput').click()">
      <div style="font-size: 24px;">📄</div>
      <p id="filename">Clique ou arraste o CSV/OFX</p>
      <p style="font-size: 11px; color: #aaa;">Bradesco CSV ou OFX</p>
    </div>
    <input type="file" id="fileInput" accept=".csv,.ofx,.OFX,.CSV">
  </div>

  <!-- Preview -->
  <div id="preview" class="section">
    <h3>Preview</h3>
    <div class="stat"><span class="label">Formato:</span><span class="value" id="pFormato">—</span></div>
    <div class="stat"><span class="label">Período:</span><span class="value" id="pPeriodo">—</span></div>
    <div class="divider"></div>
    <div class="stat"><span class="label">Total de transações:</span><span class="value" id="pTotal">—</span></div>
    <div class="stat"><span class="label">Novas:</span><span class="value green" id="pNovas">—</span></div>
    <div class="stat"><span class="label">Já existentes (dedup):</span><span class="value gray" id="pDuplicatas">—</span></div>

    <button class="btn btn-primary" id="btnImportar" onclick="importar()">
      🚀 Importar
    </button>
  </div>

  <!-- Spinner -->
  <div class="spinner" id="spinner">
    ⏳ Importando e classificando...
  </div>

  <!-- Resultado -->
  <div id="resultado" class="section">
    <h3>Resultado</h3>
    <div class="stat"><span class="label">Importadas:</span><span class="value green" id="rImportadas">—</span></div>
    <div class="stat"><span class="label">Puladas (duplicata):</span><span class="value gray" id="rPuladas">—</span></div>
    <div class="divider"></div>
    <div class="stat"><span class="label">🟢 Auto-classificadas:</span><span class="value green" id="rVerdes">—</span></div>
    <div class="stat"><span class="label">🟡 Para revisar:</span><span class="value yellow" id="rAmarelas">—</span></div>
    <div class="stat"><span class="label">🔴 Manual:</span><span class="value red" id="rVermelhas">—</span></div>

    <button class="btn btn-secondary" onclick="filtrarPendentes()">
      🔍 Ver pendentes
    </button>
  </div>

  <script>
    var conteudoArquivo = null;

    // File input
    document.getElementById('fileInput').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (file) carregarArquivo(file);
    });

    // Drag & drop
    var dropzone = document.getElementById('dropzone');
    dropzone.addEventListener('dragover', function(e) { e.preventDefault(); dropzone.classList.add('active'); });
    dropzone.addEventListener('dragleave', function() { dropzone.classList.remove('active'); });
    dropzone.addEventListener('drop', function(e) {
      e.preventDefault();
      dropzone.classList.remove('active');
      if (e.dataTransfer.files.length) carregarArquivo(e.dataTransfer.files[0]);
    });

    function carregarArquivo(file) {
      document.getElementById('filename').textContent = file.name;
      dropzone.classList.add('active');

      var reader = new FileReader();
      reader.onload = function(e) {
        conteudoArquivo = e.target.result;
        // Preview
        google.script.run
          .withSuccessHandler(mostrarPreview)
          .withFailureHandler(mostrarErro)
          .previewImport(conteudoArquivo);
      };
      reader.readAsText(file, 'ISO-8859-1'); // Bradesco usa Latin-1
    }

    function mostrarPreview(data) {
      if (data.erro) {
        mostrarErro(data.erro);
        return;
      }
      document.getElementById('pFormato').textContent = data.formato;
      document.getElementById('pPeriodo').textContent = data.periodo;
      document.getElementById('pTotal').textContent = data.total;
      document.getElementById('pNovas').textContent = data.novas;
      document.getElementById('pDuplicatas').textContent = data.duplicatas;
      document.getElementById('btnImportar').textContent = '🚀 Importar ' + data.novas + ' transações';
      document.getElementById('btnImportar').disabled = data.novas === 0;
      document.getElementById('preview').style.display = 'block';
      document.getElementById('resultado').style.display = 'none';
    }

    function importar() {
      document.getElementById('btnImportar').disabled = true;
      document.getElementById('spinner').classList.add('active');

      google.script.run
        .withSuccessHandler(mostrarResultado)
        .withFailureHandler(mostrarErro)
        .executarImport(conteudoArquivo);
    }

    function mostrarResultado(data) {
      document.getElementById('spinner').classList.remove('active');

      if (data.erro) {
        mostrarErro(data.erro);
        return;
      }

      document.getElementById('rImportadas').textContent = data.importadas;
      document.getElementById('rPuladas').textContent = data.puladas;
      document.getElementById('rVerdes').textContent = data.verdes;
      document.getElementById('rAmarelas').textContent = data.amarelas;
      document.getElementById('rVermelhas').textContent = data.vermelhas;
      document.getElementById('resultado').style.display = 'block';
      document.getElementById('preview').style.display = 'none';
    }

    function mostrarErro(err) {
      document.getElementById('spinner').classList.remove('active');
      alert('❌ Erro: ' + (err.message || err));
    }

    function filtrarPendentes() {
      google.script.host.close();
      // O usuário pode filtrar manualmente na aba por Status 🟡 ou 🔴
    }
  </script>

</body>
</html>
