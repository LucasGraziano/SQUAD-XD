version: '3.8'

services:
  crypto-db:
    image: postgres:13
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - crypto_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  crypto-fetcher-service:
    build:
      context: ./crypto-fetcher-service
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      - SQLALCHEMY_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@crypto-db/${POSTGRES_DB}
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY}
      - BINANCE_TESTNET=${BINANCE_TESTNET}
    depends_on:
      crypto-db:
        condition: service_healthy

  ml-prediction-service:
    build:
      context: ./ml-prediction-service
    ports:
      - "8002:8000"
    environment:
      - CRYPTO_FETCHER_URL=http://crypto-fetcher-service:8000

  sentiment-analysis-service:
    build:
      context: ./sentiment-analysis-service
    ports:
      - "8003:8000"

  trading-bot-service:
    build:
      context: ./trading-bot-service
    ports:
      - "8004:8000"
    env_file: .env
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY}
      - BINANCE_TESTNET=${BINANCE_TESTNET}
      - ML_SERVICE_URL=http://ml-prediction-service:8000
      - CRYPTO_FETCHER_URL=http://crypto-fetcher-service:8000
      - SENTIMENT_URL=http://sentiment-analysis-service:8000

  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "8000:8000"
    environment:
      - CRYPTO_FETCHER_URL=http://crypto-fetcher-service:8000
      - ML_SERVICE_URL=http://ml-prediction-service:8000
      - SENTIMENT_URL=http://sentiment-analysis-service:8000
      - TRADING_BOT_URL=http://trading-bot-service:8000
    depends_on:
      - crypto-fetcher-service
      - ml-prediction-service
      - sentiment-analysis-service
      - trading-bot-service

  frontend:
    build:
      context: ./front-end
    ports:
      - "8080:80"
    depends_on:
      - api-gateway

volumes:
  crypto_data:
