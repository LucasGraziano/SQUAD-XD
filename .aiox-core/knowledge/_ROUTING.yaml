# Token budget por nivel de carregamento:
token_budget:
  index_only: 50          # _index.md de 1 dominio
  single_expert: 500      # 1 expert comprimido (v2)
  single_dna_v2: 700      # 1 expert DNA v2 (5 camadas)
  single_dna_v3: 900      # 1 expert DNA v3 (5 camadas + Anti-Patterns + Situation Map)
  single_dossier: 1000    # 1 dossier cross-source
  single_playbook: 800    # 1 playbook operacional
  single_decision_map: 200  # 1 _decision-map.md
  single_anti_patterns: 300 # 1 _anti-patterns.md
  full_domain: 2500       # Todos experts de 1 dominio
  max_per_session: 5000   # Limite total de knowledge tokens

# Notas de carregamento v3:
# - decision_maps e anti_patterns sao carregados sob demanda com *knowledge decision-map:{dominio}
# - situations_filter define quais IDs do _SITUATIONS.yaml sao relevantes para o agente
# - cross_domain_dossiers sao os dossiers que cobrem o expert em multiplos dominios simultaneamente
# - Ordem de prioridade: _SITUATIONS.yaml (router) → domain index → DNA → dossier/decision-map/anti-patterns
