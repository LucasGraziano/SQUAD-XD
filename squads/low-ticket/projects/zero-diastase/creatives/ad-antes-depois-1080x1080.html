<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>Ad — Antes y Después 1080x1080</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: #111;
    position: relative;
  }

  /* === FULL IMAGE === */
  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    animation: imgReveal 1.5s ease-out 0.3s forwards;
  }

  @keyframes imgReveal {
    0% { opacity: 0; transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* === DARK GRADIENT OVERLAY === */
  .overlay-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 280px;
    background: linear-gradient(180deg, rgba(0,0,0,0.75) 0%, transparent 100%);
    z-index: 2;
  }

  .overlay-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 380px;
    background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.6) 50%, transparent 100%);
    z-index: 2;
  }

  /* === TOP CONTENT === */
  .top-content {
    position: absolute;
    top: 28px;
    left: 0;
    right: 0;
    z-index: 5;
    text-align: center;
    opacity: 0;
    animation: fadeSlideDown 0.8s ease-out 1.5s forwards;
  }

  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(232,131,124,0.2);
    border: 1.5px solid rgba(232,131,124,0.4);
    border-radius: 50px;
    padding: 8px 22px;
  }

  .eyebrow-dot {
    width: 9px;
    height: 9px;
    background: #E8837C;
    border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .eyebrow span {
    font-size: 20px;
    font-weight: 800;
    color: #E8837C;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* === BOTTOM CONTENT === */
  .bottom-content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 5;
    padding: 0 48px 40px;
    text-align: center;
  }

  .headline {
    font-family: 'Poppins', sans-serif;
    font-size: 60px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.1;
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeSlideUp 1.0s ease-out 5.0s forwards;
  }

  .headline .coral { color: #E8837C; }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .sub {
    font-size: 30px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease-out 7.0s forwards;
  }

  .sub strong { color: #7ECEC1; font-weight: 800; }

  .cta {
    display: inline-block;
    padding: 22px 64px;
    border-radius: 16px;
    font-size: 38px;
    font-weight: 800;
    color: #FFFFFF;
    text-decoration: none;
    background: linear-gradient(135deg, #E8837C 0%, #D4706A 100%);
    box-shadow: 0 8px 30px rgba(232,131,124,0.4);
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: ctaPop 0.8s cubic-bezier(0.34,1.4,0.64,1) 9.0s forwards;
  }

  @keyframes ctaPop {
    0% { opacity: 0; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1); }
  }

  .cta::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: skewX(-20deg);
    animation: shine 4s ease-in-out 11s infinite;
  }

  @keyframes shine {
    0% { left: -100%; }
    40%, 100% { left: 150%; }
  }

  .cta .arrow {
    margin-left: 10px;
    display: inline-block;
    animation: nudge 3s ease-in-out 11s infinite;
  }

  @keyframes nudge {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(8px); }
  }

  .disclaimer {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    margin-top: 10px;
  }
</style>
</head>
<body>
  <img class="hero-img" src="img-antes-depois.png" alt="Antes y Después">
  <div class="overlay-top"></div>
  <div class="overlay-bottom"></div>
  <div class="top-content">
    <div class="eyebrow">
      <div class="eyebrow-dot"></div>
      <span>Resultado Real</span>
    </div>
  </div>

  <div class="bottom-content">
    <div class="headline">28 días de <span class="coral">Zero Diastasis</span></div>
    <div class="sub"><strong>8 min/día</strong> · Desde tu casa · Sin cirugía</div>
    <a href="#" class="cta">HAZ EL TEST GRATIS <span class="arrow">→</span></a>
    <div class="disclaimer">*Resultados pueden variar. No reemplaza consejo médico.</div>
  </div>
</body>
</html>
