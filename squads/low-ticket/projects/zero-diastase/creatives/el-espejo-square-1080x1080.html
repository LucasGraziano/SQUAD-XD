<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>El Espejo — Square 1080x1080</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: #FFF8F5;
    position: relative;
  }

  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 800px 600px at 50% 20%, rgba(232,131,124,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 500px 300px at 20% 90%, rgba(126,206,193,0.06) 0%, transparent 70%);
  }

  .dots {
    position: absolute;
    inset: 0;
    opacity: 0.02;
    background-image: radial-gradient(#2D2D2D 1px, transparent 1px);
    background-size: 28px 28px;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 48px 36px;
  }

  /* === HOOK QUESTION === */
  .hook {
    text-align: center;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeSlideDown 1.0s ease-out 0.3s forwards;
  }

  .hook h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 62px;
    font-weight: 900;
    color: #2D2D2D;
    line-height: 1.08;
  }

  .hook h1 .coral { color: #E8837C; }

  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-25px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hook-sub {
    font-size: 28px;
    font-weight: 500;
    color: #888;
    margin-top: 12px;
    opacity: 0;
    animation: fadeIn 0.8s ease-out 1.5s forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* === FAILED ATTEMPTS === */
  .attempts {
    display: flex;
    gap: 16px;
    margin: 32px 0;
    width: 100%;
    max-width: 920px;
  }

  .attempt {
    flex: 1;
    background: #F5E6E0;
    border: 1.5px solid rgba(217,79,79,0.12);
    border-radius: 20px;
    padding: 24px 16px;
    text-align: center;
    opacity: 0;
    position: relative;
  }

  .attempt:nth-child(1) { animation: attemptIn 0.7s ease-out 2.5s forwards; }
  .attempt:nth-child(2) { animation: attemptIn 0.7s ease-out 3.0s forwards; }
  .attempt:nth-child(3) { animation: attemptIn 0.7s ease-out 3.5s forwards; }
  .attempt:nth-child(4) { animation: attemptIn 0.7s ease-out 4.0s forwards; }

  @keyframes attemptIn {
    0% { opacity: 0; transform: translateY(30px) scale(0.9); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .attempt-emoji {
    font-size: 42px;
    margin-bottom: 10px;
  }

  .attempt-name {
    font-size: 22px;
    font-weight: 700;
    color: #7A5050;
    margin-bottom: 6px;
  }

  .attempt-x {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(217,79,79,0.12);
    border: 1.5px solid rgba(217,79,79,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 900;
    color: #D94F4F;
    opacity: 0;
  }

  .attempt:nth-child(1) .attempt-x { animation: xPop 0.4s ease-out 4.8s forwards; }
  .attempt:nth-child(2) .attempt-x { animation: xPop 0.4s ease-out 5.0s forwards; }
  .attempt:nth-child(3) .attempt-x { animation: xPop 0.4s ease-out 5.2s forwards; }
  .attempt:nth-child(4) .attempt-x { animation: xPop 0.4s ease-out 5.4s forwards; }

  @keyframes xPop {
    0% { opacity: 0; transform: scale(0); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* === NADA FUNCIONÓ TEXT === */
  .nada {
    font-family: 'Poppins', sans-serif;
    font-size: 44px;
    font-weight: 900;
    color: #D94F4F;
    text-align: center;
    margin-bottom: 12px;
    opacity: 0;
    animation: nadaReveal 0.8s ease-out 5.8s forwards;
  }

  @keyframes nadaReveal {
    0% { opacity: 0; transform: scale(0.7); }
    60% { transform: scale(1.08); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* === SOLUTION === */
  .solution {
    background: linear-gradient(180deg, #EEFAF6 0%, #E2F5EF 100%);
    border: 2.5px solid rgba(126,206,193,0.5);
    border-radius: 22px;
    padding: 28px 36px;
    text-align: center;
    width: 100%;
    max-width: 920px;
    margin-bottom: 28px;
    box-shadow:
      0 10px 40px rgba(126,206,193,0.15),
      0 4px 14px rgba(126,206,193,0.08);
    opacity: 0;
    animation: solutionPop 1.0s cubic-bezier(0.34,1.4,0.64,1) 6.8s forwards;
    position: relative;
  }

  @keyframes solutionPop {
    0% { opacity: 0; transform: translateY(40px) scale(0.85); }
    60% { transform: translateY(-5px) scale(1.02); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .solution-badge {
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #7ECEC1, #5DB8AA);
    color: white;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 24px;
    border-radius: 50px;
    box-shadow: 0 4px 14px rgba(126,206,193,0.4);
    white-space: nowrap;
  }

  .solution h2 {
    font-family: 'Poppins', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: #2D6B5E;
    margin-top: 12px;
    margin-bottom: 10px;
  }

  .solution-features {
    display: flex;
    justify-content: center;
    gap: 28px;
  }

  .solution-feat {
    font-size: 24px;
    font-weight: 700;
    color: #3D8B7A;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .check-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(126,206,193,0.2);
    border: 1.5px solid rgba(126,206,193,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #3D8B7A;
    flex-shrink: 0;
  }

  /* === CTA === */
  .cta-wrap {
    width: 100%;
    max-width: 780px;
    opacity: 0;
    animation: ctaSlideUp 0.9s ease-out 8.5s forwards;
  }

  @keyframes ctaSlideUp {
    0% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .cta {
    display: block;
    width: 100%;
    text-align: center;
    padding: 28px 32px;
    border-radius: 18px;
    font-family: 'Poppins', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: #FFFFFF;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #E8837C 0%, #D4706A 100%);
    box-shadow:
      0 8px 30px rgba(232,131,124,0.35),
      0 3px 10px rgba(232,131,124,0.2);
  }

  .cta::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    transform: skewX(-20deg);
    animation: shine 2.5s ease-in-out 9.5s infinite;
  }

  @keyframes shine {
    0% { left: -100%; }
    40%, 100% { left: 150%; }
  }

  .cta .arrow {
    margin-left: 10px;
    display: inline-block;
    animation: nudge 1.2s ease-in-out 9.5s infinite;
  }

  @keyframes nudge {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(8px); }
  }

  .disclaimer {
    text-align: center;
    font-size: 13px;
    color: #C0B0B0;
    margin-top: 10px;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="dots"></div>

  <div class="container">
    <div class="hook">
      <h1>¿Sigues pareciendo<br><span class="coral">embarazada</span>?</h1>
    </div>

    <div class="attempts">
      <div class="attempt">
        <div class="attempt-x">✕</div>
        <div class="attempt-emoji">🩱</div>
        <div class="attempt-name">Fajas</div>
      </div>
      <div class="attempt">
        <div class="attempt-x">✕</div>
        <div class="attempt-emoji">💪</div>
        <div class="attempt-name">Gym</div>
      </div>
      <div class="attempt">
        <div class="attempt-x">✕</div>
        <div class="attempt-emoji">🥗</div>
        <div class="attempt-name">Dietas</div>
      </div>
      <div class="attempt">
        <div class="attempt-x">✕</div>
        <div class="attempt-emoji">💊</div>
        <div class="attempt-name">Pastillas</div>
      </div>
    </div>

    <div class="nada">Nada funcionó.</div>

    <div class="solution">
      <div class="solution-badge">✨ Hasta Ahora</div>
      <h2>Zero Diastasis</h2>
      <div class="solution-features">
        <div class="solution-feat"><span class="check-icon">✓</span> 28 días</div>
        <div class="solution-feat"><span class="check-icon">✓</span> 8 min/día</div>
        <div class="solution-feat"><span class="check-icon">✓</span> $19.90</div>
      </div>
    </div>

    <div class="cta-wrap">
      <a href="#" class="cta">
        HAZ EL TEST GRATIS <span class="arrow">→</span>
      </a>
      <div class="disclaimer">*Resultados pueden variar. No reemplaza consejo médico.</div>
    </div>
  </div>
</body>
</html>
