<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>Ad — Texto Bold 1080x1080</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: #FFF8F5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px;
    position: relative;
  }

  /* === SUBTLE BACKGROUND PATTERN === */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 20% 30%, rgba(232,131,124,0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(126,206,193,0.06) 0%, transparent 50%);
  }

  /* === TOP BADGE === */
  .badge {
    position: absolute;
    top: 48px;
    left: 50%;
    transform: translateX(-50%);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(232,131,124,0.1);
    border: 1.5px solid rgba(232,131,124,0.25);
    border-radius: 50px;
    padding: 10px 24px;
    opacity: 0;
    animation: fadeIn 0.5s ease-out 0.2s forwards;
  }

  .badge-dot {
    width: 8px;
    height: 8px;
    background: #E8837C;
    border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .badge span {
    font-size: 18px;
    font-weight: 700;
    color: #E8837C;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* === MAIN TEXT === */
  .main-text {
    text-align: center;
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: fadeIn 0.6s ease-out 0.1s forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .line {
    font-size: 72px;
    font-weight: 800;
    color: #2D2D2D;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .line.coral { color: #E8837C; }

  .line.small {
    font-size: 48px;
    font-weight: 600;
    color: #888;
    margin-top: 16px;
  }

  .highlight {
    background: linear-gradient(180deg, transparent 55%, rgba(232,131,124,0.2) 55%);
    padding: 0 4px;
  }

  /* === BOTTOM SECTION === */
  .bottom {
    position: absolute;
    bottom: 48px;
    left: 80px;
    right: 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0;
    animation: fadeSlideUp 0.6s ease-out 0.8s forwards;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .brand {
    font-size: 28px;
    font-weight: 800;
    color: #3D8B7A;
  }

  .brand-sub {
    font-size: 18px;
    font-weight: 500;
    color: #AAA;
  }

  .cta-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #E8837C, #D4706A);
    color: white;
    font-size: 28px;
    font-weight: 800;
    padding: 18px 36px;
    border-radius: 50px;
    box-shadow: 0 6px 24px rgba(232,131,124,0.3);
    position: relative;
    overflow: hidden;
  }

  .cta-pill::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    transform: skewX(-20deg);
    animation: shine 4s ease-in-out 3s infinite;
  }

  @keyframes shine {
    0% { left: -100%; }
    40%, 100% { left: 150%; }
  }

  .cta-pill .arrow {
    display: inline-block;
    animation: nudge 3s ease-in-out 3s infinite;
  }

  @keyframes nudge {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(6px); }
  }
</style>
</head>
<body>
  <div class="badge">
    <div class="badge-dot"></div>
    <span>Diastasis abdominal</span>
  </div>

  <div class="main-text">
    <div class="line">Si tu barriga parece</div>
    <div class="line">de <span class="highlight">5 meses</span></div>
    <div class="line coral">y tu bebé ya tiene 2 años...</div>
    <div class="line small">lee esto. 👇</div>
  </div>

  <div class="bottom">
    <div>
      <div class="brand">Zero Diastasis</div>
      <div class="brand-sub">Protocolo de 28 días · $19.90</div>
    </div>
    <div class="cta-pill">DESCUBRE TU NIVEL <span class="arrow">→</span></div>
  </div>
</body>
</html>
