<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>Ad — Músculo Dormido 1080x1080</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: #1A1A2E;
    position: relative;
  }

  /* === GRADIENT OVERLAY === */
  .bg-gradient {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 80%, rgba(232,131,124,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 20%, rgba(61,139,122,0.1) 0%, transparent 50%);
    z-index: 1;
  }

  /* === ANATOMY ILLUSTRATION AREA === */
  .illustration {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 480px;
    height: 480px;
    z-index: 3;
    opacity: 0;
    animation: illustrationReveal 1.4s ease-out 0.3s forwards;
  }

  .illustration img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* Glow ring behind illustration */
  .illustration::before {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,131,124,0.2) 0%, transparent 70%);
    animation: glowPulse 3s ease-in-out 2s infinite;
  }

  @keyframes illustrationReveal {
    0% { opacity: 0; transform: translateX(-50%) scale(0.9); }
    100% { opacity: 1; transform: translateX(-50%) scale(1); }
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  /* === FLOATING LABEL === */
  .label-badge {
    position: absolute;
    top: 44px;
    left: 44px;
    z-index: 5;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(126,206,193,0.15);
    border: 1.5px solid rgba(126,206,193,0.3);
    backdrop-filter: blur(12px);
    border-radius: 50px;
    padding: 10px 22px;
    opacity: 0;
    animation: badgeFade 0.6s ease-out 1.5s forwards;
  }

  @keyframes badgeFade {
    0% { opacity: 0; transform: translateY(-8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .label-dot {
    width: 8px;
    height: 8px;
    background: #7ECEC1;
    border-radius: 50%;
    animation: dotPulse 2s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .label-text {
    font-size: 18px;
    font-weight: 700;
    color: #7ECEC1;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* === BOTTOM CONTENT === */
  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 5;
    padding: 0 48px 44px;
  }

  .headline {
    font-size: 56px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.05;
    margin-bottom: 12px;
    opacity: 0;
    animation: slideUp 0.9s ease-out 2.0s forwards;
  }

  .headline .coral { color: #E8837C; }

  @keyframes slideUp {
    0% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .subheadline {
    font-size: 26px;
    font-weight: 500;
    color: rgba(255,255,255,0.65);
    line-height: 1.4;
    margin-bottom: 24px;
    opacity: 0;
    animation: slideUp 0.8s ease-out 3.5s forwards;
  }

  .subheadline strong {
    color: #7ECEC1;
    font-weight: 700;
  }

  /* === CTA BAR === */
  .cta-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    opacity: 0;
    animation: slideUp 0.8s ease-out 5.0s forwards;
  }

  .cta {
    flex: 1;
    display: block;
    text-align: center;
    padding: 22px;
    border-radius: 16px;
    font-size: 30px;
    font-weight: 800;
    color: #FFFFFF;
    text-decoration: none;
    background: linear-gradient(135deg, #E8837C 0%, #D4706A 100%);
    box-shadow: 0 8px 32px rgba(232,131,124,0.4);
    position: relative;
    overflow: hidden;
  }

  .cta::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: skewX(-20deg);
    animation: shine 4s ease-in-out 7s infinite;
  }

  @keyframes shine {
    0% { left: -100%; }
    40%, 100% { left: 150%; }
  }

  .cta .arrow {
    margin-left: 8px;
    display: inline-block;
    animation: nudge 3s ease-in-out 7s infinite;
  }

  @keyframes nudge {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(6px); }
  }

  .price-tag {
    text-align: center;
    padding: 0 16px;
  }

  .price-old {
    font-size: 16px;
    color: rgba(255,255,255,0.35);
    text-decoration: line-through;
  }

  .price-new {
    font-size: 40px;
    font-weight: 900;
    color: #FFFFFF;
  }

  .price-new .dollar { font-size: 20px; color: #D4A574; vertical-align: super; }
  .price-new .cents { font-size: 20px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
  <div class="bg-gradient"></div>

  <div class="illustration">
    <img src="img-musculo-dormido.png" alt="Ilustración músculo TVA dormido vs activo">
  </div>

  <div class="label-badge">
    <div class="label-dot"></div>
    <span class="label-text">Educativo</span>
  </div>

  <div class="content">
    <div class="headline">Tu barriga de mamá<br><span class="coral">NO es gordura.</span></div>
    <div class="subheadline">Es un <strong>músculo dormido</strong> que nadie te enseñó a despertar.<br>Descubre cómo reactivarlo en 28 días.</div>

    <div class="cta-bar">
      <div class="price-tag">
        <div class="price-old">$99.90</div>
        <div class="price-new"><span class="dollar">$</span>19<span class="cents">.90</span></div>
      </div>
      <a href="#" class="cta">HAZ EL TEST GRATIS <span class="arrow">&rarr;</span></a>
    </div>
  </div>
</body>
</html>
