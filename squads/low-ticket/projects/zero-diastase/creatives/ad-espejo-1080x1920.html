<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>Ad — El Espejo 1080x1920</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: #0A0A0A;
    position: relative;
  }

  /* === IMAGE — TOP 50% === */
  .hero-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 50%;
    object-fit: cover;
    object-position: center center;
    filter: brightness(0.7) saturate(0.9);
    opacity: 0;
    animation: imgSlideIn 1.2s ease-out 0.3s forwards;
  }

  @keyframes imgSlideIn {
    0% { opacity: 0; transform: translateY(-30px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Fade bottom edge of image */
  .img-fade {
    position: absolute;
    top: 38%;
    left: 0;
    right: 0;
    height: 15%;
    background: linear-gradient(0deg, #0A0A0A, transparent);
    z-index: 2;
  }

  /* === BOTTOM PANEL === */
  .panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 52%;
    z-index: 3;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 56px 60px;
    background: #0A0A0A;
  }

  .hook {
    opacity: 0;
    animation: fadeSlideUp 1.0s ease-out 2.0s forwards;
    margin-bottom: 36px;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hook h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 66px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.08;
  }

  .hook h1 .coral { color: #E8837C; }

  .hook-sub {
    font-size: 30px;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    margin-top: 18px;
    line-height: 1.4;
  }

  /* === FAILED LIST === */
  .failures {
    list-style: none;
    margin-bottom: 36px;
  }

  .failures li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    font-size: 32px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    opacity: 0;
    position: relative;
  }

  .failures li:nth-child(1) { animation: failIn 0.6s ease-out 5.0s forwards; }
  .failures li:nth-child(2) { animation: failIn 0.6s ease-out 5.8s forwards; }
  .failures li:nth-child(3) { animation: failIn 0.6s ease-out 6.6s forwards; }

  @keyframes failIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .failures li::after {
    content: '';
    position: absolute;
    left: 40px;
    right: 0;
    top: 50%;
    height: 2.5px;
    background: #D94F4F;
    transform: rotate(-3deg) scaleX(0);
    transform-origin: left;
  }

  .failures li:nth-child(1)::after { animation: strike 0.4s ease-out 8.0s forwards; }
  .failures li:nth-child(2)::after { animation: strike 0.4s ease-out 8.5s forwards; }
  .failures li:nth-child(3)::after { animation: strike 0.4s ease-out 9.0s forwards; }

  @keyframes strike {
    to { transform: rotate(-3deg) scaleX(1); }
  }

  .fail-x {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(217,79,79,0.2);
    border: 1.5px solid rgba(217,79,79,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 900;
    color: #D94F4F;
    flex-shrink: 0;
  }

  /* === SOLUTION CARD === */
  .solution {
    background: linear-gradient(135deg, rgba(126,206,193,0.12), rgba(126,206,193,0.05));
    border: 2px solid rgba(126,206,193,0.35);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 32px;
    opacity: 0;
    animation: solutionReveal 0.9s cubic-bezier(0.34,1.4,0.64,1) 11.0s forwards;
  }

  @keyframes solutionReveal {
    0% { opacity: 0; transform: scale(0.85) translateY(15px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .solution-name {
    font-family: 'Poppins', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: #7ECEC1;
    margin-bottom: 10px;
  }

  .solution-feats {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }

  .sf {
    font-size: 26px;
    font-weight: 700;
    color: rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sf-check {
    color: #7ECEC1;
    font-size: 16px;
  }

  /* === CTA === */
  .cta {
    display: block;
    width: 100%;
    text-align: center;
    padding: 26px;
    border-radius: 16px;
    font-size: 38px;
    font-weight: 800;
    color: #FFFFFF;
    text-decoration: none;
    background: linear-gradient(135deg, #E8837C 0%, #D4706A 100%);
    box-shadow: 0 8px 25px rgba(232,131,124,0.35);
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeSlideUp 0.8s ease-out 13.0s forwards;
  }

  .cta::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    transform: skewX(-20deg);
    animation: shine 4s ease-in-out 15s infinite;
  }

  @keyframes shine {
    0% { left: -100%; }
    40%, 100% { left: 150%; }
  }

  .cta .arrow {
    margin-left: 8px;
    display: inline-block;
    animation: nudge 3s ease-in-out 15s infinite;
  }

  @keyframes nudge {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(6px); }
  }
</style>
</head>
<body>
  <img class="hero-img" src="img-espelho.png" alt="Sofia en el espejo">
  <div class="img-fade"></div>

  <div class="panel">
    <div class="hook">
      <h1>¿Sigues<br>pareciendo<br><span class="coral">embarazada?</span></h1>
      <div class="hook-sub">Meses después del parto<br>y tu abdomen no vuelve.</div>
    </div>

    <ul class="failures">
      <li><span class="fail-x">✕</span> Fajas — no corrigen</li>
      <li><span class="fail-x">✕</span> Gym — lo empeora</li>
      <li><span class="fail-x">✕</span> Dietas — no es grasa</li>
    </ul>

    <div class="solution">
      <div class="solution-name">Zero Diastasis · $19.90</div>
      <div class="solution-feats">
        <div class="sf"><span class="sf-check">✓</span> 28 días</div>
        <div class="sf"><span class="sf-check">✓</span> 8 min/día</div>
        <div class="sf"><span class="sf-check">✓</span> En casa</div>
        <div class="sf"><span class="sf-check">✓</span> Garantía</div>
      </div>
    </div>

    <a href="#" class="cta">HAZ EL TEST <span class="arrow">→</span></a>
  </div>
</body>
</html>
