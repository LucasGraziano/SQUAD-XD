<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>Card 5 CTA — Story 1080x1920</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: #FFF8F5;
    position: relative;
  }

  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 800px 500px at 50% 20%, rgba(126,206,193,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 600px 400px at 50% 80%, rgba(232,131,124,0.06) 0%, transparent 70%);
  }

  .dots {
    position: absolute;
    inset: 0;
    opacity: 0.02;
    background-image: radial-gradient(#2D2D2D 1px, transparent 1px);
    background-size: 28px 28px;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 60px 60px;
    text-align: center;
  }

  /* === TOP BADGE === */
  .top-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #E8837C, #E06B63);
    border-radius: 50px;
    padding: 14px 36px;
    margin-bottom: 60px;
    box-shadow: 0 6px 20px rgba(232,131,124,0.3);
  }

  .top-badge span {
    font-size: 24px;
    font-weight: 700;
    color: white;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* === PRICE SECTION === */
  .price-intro {
    font-size: 32px;
    font-weight: 500;
    color: #999;
    margin-bottom: 24px;
  }

  .price-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    margin-bottom: 24px;
  }

  .price-old {
    font-size: 56px;
    font-weight: 600;
    color: #CCCCCC;
    text-decoration: line-through;
    text-decoration-color: #E8837C;
    text-decoration-thickness: 4px;
  }

  .price-new {
    font-size: 110px;
    font-weight: 900;
    color: #2D2D2D;
    line-height: 1;
  }

  .price-new .currency {
    font-size: 60px;
    font-weight: 700;
    vertical-align: super;
    margin-right: 2px;
  }

  /* === DISCOUNT TAG === */
  .discount-tag {
    display: inline-block;
    background: rgba(232,131,124,0.12);
    border: 1.5px solid rgba(232,131,124,0.25);
    border-radius: 50px;
    padding: 12px 32px;
    margin-bottom: 60px;
  }

  .discount-tag span {
    font-size: 24px;
    font-weight: 700;
    color: #E8837C;
    letter-spacing: 0.5px;
  }

  /* === FEATURES === */
  .features-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px 40px;
    margin-bottom: 60px;
  }

  .feature {
    font-size: 26px;
    font-weight: 600;
    color: #2D2D2D;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .feature .check {
    color: #7ECEC1;
    font-size: 26px;
  }

  /* === CTA BUTTON === */
  .cta-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #E8837C 0%, #E06B63 100%);
    color: white;
    font-family: 'Poppins', sans-serif;
    font-size: 36px;
    font-weight: 800;
    padding: 28px 80px;
    border-radius: 60px;
    border: none;
    cursor: pointer;
    box-shadow: 0 10px 40px rgba(232,131,124,0.35);
    position: relative;
    overflow: hidden;
    letter-spacing: 0.5px;
    margin-bottom: 40px;
    text-transform: uppercase;
  }

  .cta-button::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    animation: shine 3s ease-in-out infinite;
  }

  @keyframes shine {
    0% { left: -100%; }
    50% { left: 120%; }
    100% { left: 120%; }
  }

  .cta-arrow {
    margin-left: 12px;
    font-size: 34px;
  }

  /* === DISCLAIMER === */
  .disclaimer {
    font-size: 18px;
    font-weight: 400;
    color: #BBBBBB;
    max-width: 700px;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="dots"></div>

  <div class="container">
    <div class="top-badge">
      <span>&#11088; Mejor Opci&oacute;n</span>
    </div>

    <p class="price-intro">Todo esto por solo</p>

    <div class="price-row">
      <span class="price-old">$99.90</span>
      <span class="price-new"><span class="currency">$</span>19.90</span>
    </div>

    <div class="discount-tag">
      <span>80% de descuento</span>
    </div>

    <div class="features-grid">
      <span class="feature"><span class="check">&#10003;</span> 28 d&iacute;as</span>
      <span class="feature"><span class="check">&#10003;</span> 8 min/d&iacute;a</span>
      <span class="feature"><span class="check">&#10003;</span> En casa</span>
      <span class="feature"><span class="check">&#10003;</span> Garant&iacute;a</span>
    </div>

    <div class="cta-button">
      Haz el test gratis <span class="cta-arrow">&rarr;</span>
    </div>

    <p class="disclaimer">*Resultados pueden variar. No reemplaza consejo m&eacute;dico.</p>
  </div>
</body>
</html>
