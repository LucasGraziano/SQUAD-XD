<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card B - Fases 3 & 4 - Square</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    font-family: 'Poppins', sans-serif;
    background: #FFF8F5;
    background-image:
      radial-gradient(ellipse at 30% 20%, rgba(107,163,214,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(126,206,193,0.06) 0%, transparent 60%),
      radial-gradient(circle at 50% 50%, rgba(255,248,245,1) 0%, rgba(252,242,237,1) 100%);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 70px;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.02) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  .eyebrow {
    display: inline-block;
    background: linear-gradient(135deg, #6BA3D6, #5a8fc2);
    color: white;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2.5px;
    padding: 10px 32px;
    border-radius: 50px;
    text-transform: uppercase;
  }

  .phases-container {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .phase-section {
    display: flex;
    align-items: center;
    gap: 36px;
    padding: 36px 20px;
  }

  .phase-section.achievement {
    position: relative;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(126,206,193,0.06) 0%, rgba(126,206,193,0.02) 100%);
  }

  .phase-section.achievement::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 21px;
    background: linear-gradient(135deg, rgba(126,206,193,0.2), rgba(126,206,193,0.05));
    z-index: -1;
  }

  .phase-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .phase-circle.blue {
    background: linear-gradient(135deg, #6BA3D6, #5288bc);
    box-shadow: 0 8px 30px rgba(107,163,214,0.3);
  }

  .phase-circle.mint {
    background: linear-gradient(135deg, #7ECEC1, #62b8aa);
    box-shadow:
      0 8px 30px rgba(126,206,193,0.3),
      0 0 40px rgba(126,206,193,0.15);
  }

  .phase-number {
    font-size: 38px;
    font-weight: 900;
    color: white;
    line-height: 1;
  }

  .phase-emoji {
    font-size: 24px;
    margin-top: 2px;
  }

  .phase-info {
    flex: 1;
  }

  .phase-name {
    font-size: 34px;
    font-weight: 800;
    color: #2D2D2D;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .phase-desc {
    font-size: 21px;
    font-weight: 400;
    color: #5A5A5A;
    line-height: 1.4;
    margin-bottom: 8px;
  }

  .phase-days {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .phase-days.blue { color: #6BA3D6; }
  .phase-days.mint { color: #7ECEC1; }

  .divider {
    width: 85%;
    height: 2px;
    margin: 0 auto;
    background: linear-gradient(90deg, #6BA3D6, #7ECEC1);
    opacity: 0.3;
    border-radius: 2px;
  }

  .bottom-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 10px;
  }

  .progress-container {
    width: 100%;
  }

  .progress-bar-bg {
    width: 100%;
    height: 10px;
    background: #EDE8E5;
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-bar-fill {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #E8837C, #D4A574, #6BA3D6, #7ECEC1);
    border-radius: 10px;
  }

  .progress-label {
    font-size: 16px;
    font-weight: 600;
    color: #7ECEC1;
    text-align: center;
    margin-top: 8px;
  }

  .swipe-hint {
    font-size: 15px;
    font-weight: 500;
    color: #bbb;
    text-align: right;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="eyebrow">Semana 3-4</div>

    <div class="phases-container">
      <div class="phase-section">
        <div class="phase-circle blue">
          <span class="phase-number">3</span>
          <span class="phase-emoji">🔒</span>
        </div>
        <div class="phase-info">
          <div class="phase-name">Compresión</div>
          <div class="phase-desc">Cierra la separación progresivamente</div>
          <div class="phase-days blue">Día 15-21</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="phase-section achievement">
        <div class="phase-circle mint">
          <span class="phase-number">4</span>
          <span class="phase-emoji">⚓</span>
        </div>
        <div class="phase-info">
          <div class="phase-name">Anclaje</div>
          <div class="phase-desc">Fija los resultados de forma permanente</div>
          <div class="phase-days mint">Día 22-28</div>
        </div>
      </div>
    </div>

    <div class="bottom-section">
      <div class="progress-container">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill"></div>
        </div>
        <div class="progress-label">Fase 3-4 de 4 ✅</div>
      </div>
      <div class="swipe-hint">Desliza →</div>
    </div>
  </div>
</body>
</html>
