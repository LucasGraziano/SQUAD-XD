# Low-Ticket Squad Blueprint
# Generated by @squad-creator (Craft) — 2026-02-25
# Squad para criação, teste e escala de ofertas low-ticket

squad:
  name: low-ticket
  description: "Equipe hierárquica de agentes focada em criar, testar e escalar ofertas de baixo custo (low-ticket). Cobre desde inteligência de mercado até tráfego pago."
  domain: low-ticket-offers
  version: "1.0.0"

analysis:
  entities:
    - Offer (oferta low-ticket)
    - Funnel (funil de vendas)
    - Copy (textos persuasivos)
    - Audience (público-alvo / persona)
    - Creative (criativos visuais e vídeo)
    - Metrics (KPIs de performance)
    - Product (entregável digital)
    - Hook (ganchos e headlines)
    - Campaign (campanha de tráfego)
    - Quiz (quiz funnel)

  workflows:
    - new-offer (produto do zero — pipeline completo)
    - audit (análise de materiais existentes)
    - optimize (otimização baseada em diagnóstico)
    - new-hooks (geração de variações de ganchos)
    - write-vsl (criação de VSL completa)
    - build-funnel (construção do funil)
    - launch-campaign (lançamento de campanha)

  integrations:
    - Meta Ads (Facebook/Instagram)
    - Google Ads
    - Plataformas de checkout (Hotmart, Kiwify, Stripe)
    - Email marketing (ActiveCampaign, Mailchimp)
    - Analytics (GA4)
    - AI Image Generation (Midjourney, DALL-E, Flux)
    - Page Builders (ClickFunnels, Elementor, Webflow)

  stakeholders:
    - Infoprodutor / Empreendedor digital
    - Gestor de tráfego
    - Copywriter
    - Designer

# ============================================================
# AGENT RECOMMENDATIONS
# ============================================================
recommendations:
  hierarchy:
    tier1: [commander]
    tier2: [intel-chief, copy-chief, creative-director, funnel-chief, traffic-head, product-architect, capital-allocator, mechanism-architect, ltv-architect, localization-specialist]
    tier3: [research-miner, competitor-analyst, copywriter, hook-master, script-writer, funnel-engineer, quiz-builder, media-buyer, metrics-analyst, cashflow-simulator, test-kill-operator, backend-strategist, cultural-adapter, ux-conversion-designer, brand-builder, deliverables-producer, video-editor, visual-designer]

  agents:
    # ── TIER 1: COMANDO CENTRAL ──────────────────────────────
    - id: commander
      name: Atlas
      icon: "🎖️"
      role: "Chief of Staff — Coordena todos os departamentos, define estratégia geral da oferta, aprova tese, valida pipeline completo"
      tier: 1
      department: command
      reports_to: null
      subordinates: [intel-chief, copy-chief, creative-director, funnel-chief, traffic-head, product-architect]
      commands:
        - "*new-offer"       # Pipeline completo do zero
        - "*audit"           # Análise de materiais existentes
        - "*optimize"        # Otimização baseada em diagnóstico
        - "*status"          # Status de todos os departamentos
        - "*brief"           # Gerar briefing para equipe
      confidence: 0.95
      user_added: false
      user_modified: false

    # ── TIER 2: DEPARTAMENTO DE INTELIGÊNCIA ─────────────────
    - id: intel-chief
      name: Sage
      icon: "🧠"
      role: "Chief de Inteligência — Sintetiza dados de pesquisa, define tese da oferta, coordena mineração de dados e análise competitiva"
      tier: 2
      department: intelligence
      reports_to: commander
      subordinates: [research-miner, competitor-analyst]
      commands:
        - "*define-thesis"       # Definir tese da oferta
        - "*research-brief"      # Briefing de pesquisa
        - "*synthesize"          # Sintetizar dados coletados
        - "*market-snapshot"     # Visão geral do mercado
      confidence: 0.93
      user_added: false
      user_modified: false

    - id: research-miner
      name: Scout
      icon: "⛏️"
      role: "Minerador de Pesquisa — Minera dores, desejos e linguagem do público em fóruns, Reddit, Quora, redes sociais e comunidades"
      tier: 3
      department: intelligence
      reports_to: intel-chief
      subordinates: []
      commands:
        - "*mine-pains"          # Minerar dores do público
        - "*mine-desires"        # Minerar desejos do público
        - "*extract-language"    # Extrair linguagem natural da persona
        - "*scan-forums"         # Scan em fóruns específicos
      confidence: 0.91
      user_added: false
      user_modified: false

    - id: competitor-analyst
      name: Vigil
      icon: "🔍"
      role: "Analista de Concorrência — Analisa concorrentes, biblioteca de anúncios, posicionamento, ofertas e estratégias do nicho"
      tier: 3
      department: intelligence
      reports_to: intel-chief
      subordinates: []
      commands:
        - "*analyze-competitors"   # Análise completa de concorrentes
        - "*scan-ad-library"       # Scan na biblioteca de anúncios
        - "*benchmark"             # Benchmark de ofertas do nicho
        - "*swipe-file"            # Montar swipe file de referências
      confidence: 0.90
      user_added: false
      user_modified: false

    # ── TIER 2: DEPARTAMENTO DE COPY ─────────────────────────
    - id: copy-chief
      name: Quill
      icon: "✍️"
      role: "Chief de Copy — Aprova ângulos de copy, garante consistência de voz e tom, valida poder de persuasão de todos os textos"
      tier: 2
      department: copy
      reports_to: commander
      subordinates: [copywriter, hook-master, script-writer]
      commands:
        - "*approve-angle"       # Aprovar ângulo de copy
        - "*review-copy"         # Revisar peça de copy
        - "*define-voice"        # Definir voz/tom da marca
        - "*copy-brief"          # Gerar briefing para copywriters
      confidence: 0.94
      user_added: false
      user_modified: false

    - id: copywriter
      name: Ink
      icon: "🖊️"
      role: "Copywriter — Escreve cartas de vendas, landing pages, emails, sequências, quiz copy e todo texto persuasivo da oferta"
      tier: 3
      department: copy
      reports_to: copy-chief
      subordinates: []
      commands:
        - "*write-sales-letter"   # Carta de vendas completa
        - "*write-email-sequence" # Sequência de emails
        - "*write-landing-page"   # Copy da landing page
        - "*write-quiz-copy"      # Textos do quiz funnel
        - "*write-checkout"       # Copy da página de checkout
      confidence: 0.93
      user_added: false
      user_modified: false

    - id: hook-master
      name: Snap
      icon: "🪝"
      role: "Hook Master — Especialista em criar variações de ganchos, headlines, leads e aberturas magnéticas para a persona"
      tier: 3
      department: copy
      reports_to: copy-chief
      subordinates: []
      commands:
        - "*generate-hooks"      # Gerar variações de hooks
        - "*headline-variants"   # Variações de headlines
        - "*lead-variants"       # Variações de leads/aberturas
        - "*angle-matrix"        # Matriz de ângulos x emoções
      confidence: 0.92
      user_added: false
      user_modified: false

    - id: script-writer
      name: Reel
      icon: "🎬"
      role: "Roteirista — Cria roteiros para VSL, reels, stories, criativos em vídeo e conteúdo audiovisual persuasivo"
      tier: 3
      department: copy
      reports_to: copy-chief
      subordinates: []
      commands:
        - "*write-vsl"           # Roteiro de VSL completo
        - "*write-reel-script"   # Roteiro para reels/shorts
        - "*write-story-script"  # Roteiro para stories
        - "*write-ugc-brief"     # Briefing para UGC creators
      confidence: 0.90
      user_added: false
      user_modified: false

    # ── TIER 2: DEPARTAMENTO CRIATIVO ────────────────────────
    - id: creative-director
      name: Pixel
      icon: "🎨"
      role: "Diretor Criativo — Direção de arte, prompt engineering para AI art, define identidade visual, aprova criativos de ads e materiais"
      tier: 2
      department: creative
      reports_to: commander
      subordinates: []
      commands:
        - "*create-ad-visuals"     # Gerar visuais para ads
        - "*generate-prompts"      # Prompts para AI image gen
        - "*define-visual-id"      # Definir identidade visual
        - "*creative-brief"        # Briefing criativo
        - "*review-creatives"      # Revisar criativos
      confidence: 0.91
      user_added: false
      user_modified: false

    # ── TIER 2: DEPARTAMENTO DE FUNIL ────────────────────────
    - id: funnel-chief
      name: Flow
      icon: "🔧"
      role: "Chief de Funil — Arquiteta o funil de vendas, define estratégia de conversão, fluxo do usuário e pontos de otimização"
      tier: 2
      department: funnel
      reports_to: commander
      subordinates: [funnel-engineer, quiz-builder]
      commands:
        - "*design-funnel"         # Arquitetar funil completo
        - "*audit-funnel"          # Auditar funil existente
        - "*conversion-map"        # Mapa de conversão
        - "*funnel-brief"          # Briefing técnico do funil
      confidence: 0.92
      user_added: false
      user_modified: false

    - id: funnel-engineer
      name: Forge
      icon: "⚙️"
      role: "Engenheiro de Funil — Implementa páginas, checkout, integrações, automações de email, tracking pixels e infraestrutura técnica"
      tier: 3
      department: funnel
      reports_to: funnel-chief
      subordinates: []
      commands:
        - "*build-landing"         # Construir landing page
        - "*build-checkout"        # Configurar checkout
        - "*setup-integrations"    # Configurar integrações
        - "*setup-tracking"        # Configurar pixels/tracking
        - "*setup-email-automation" # Automações de email
      confidence: 0.89
      user_added: false
      user_modified: false

    - id: quiz-builder
      name: Riddle
      icon: "❓"
      role: "Quiz Builder — Especialista em quiz funnels, lógica condicional, segmentação por respostas e personalização da jornada"
      tier: 3
      department: funnel
      reports_to: funnel-chief
      subordinates: []
      commands:
        - "*build-quiz"            # Criar quiz funnel
        - "*quiz-logic"            # Definir lógica condicional
        - "*segment-paths"         # Caminhos por segmento
        - "*quiz-copy-brief"       # Briefing de copy para quiz
      confidence: 0.88
      user_added: false
      user_modified: false

    # ── TIER 2: DEPARTAMENTO DE TRÁFEGO ──────────────────────
    - id: traffic-head
      name: Boost
      icon: "📊"
      role: "Head de Tráfego — Controla orçamento de mídia, define CPA targets, estratégia de aquisição e coordena compra de mídia"
      tier: 2
      department: traffic
      reports_to: commander
      subordinates: [media-buyer, metrics-analyst]
      commands:
        - "*media-plan"            # Plano de mídia
        - "*budget-allocation"     # Alocação de orçamento
        - "*cpa-targets"           # Definir CPA targets
        - "*campaign-strategy"     # Estratégia de campanha
      confidence: 0.92
      user_added: false
      user_modified: false

    - id: media-buyer
      name: Bid
      icon: "🎯"
      role: "Media Buyer — Estrutura campanhas, testa públicos, gerencia ads no Meta/Google, escala winners e pausa losers"
      tier: 3
      department: traffic
      reports_to: traffic-head
      subordinates: []
      commands:
        - "*structure-campaign"    # Estruturar campanha
        - "*test-audiences"        # Testar públicos
        - "*scale-winner"          # Escalar ad vencedor
        - "*kill-loser"            # Pausar ad perdedor
        - "*launch-test"           # Lançar teste A/B
      confidence: 0.91
      user_added: false
      user_modified: false

    - id: metrics-analyst
      name: Pulse
      icon: "📈"
      role: "Analista de Métricas — Analisa KPIs (CPA, CTR, ROAS, LTV), identifica winners/losers, gera relatórios e recomendações"
      tier: 3
      department: traffic
      reports_to: traffic-head
      subordinates: []
      commands:
        - "*daily-report"          # Relatório diário
        - "*identify-winners"      # Identificar winners
        - "*funnel-metrics"        # Métricas do funil
        - "*roi-analysis"          # Análise de ROI/ROAS
      confidence: 0.90
      user_added: false
      user_modified: false

    # ── TIER 2: PRODUTO (STAFF DO COMANDO) ───────────────────
    - id: product-architect
      name: Blueprint
      icon: "📦"
      role: "Arquiteto de Produto — Define formato do entregável, estrutura de conteúdo, experiência do comprador e estratégia de bônus"
      tier: 2
      department: product
      reports_to: commander
      subordinates: []
      commands:
        - "*design-product"        # Estruturar produto
        - "*define-format"         # Definir formato (ebook, curso, etc)
        - "*bonus-strategy"        # Estratégia de bônus
        - "*delivery-plan"         # Plano de entrega
        - "*content-outline"       # Outline do conteúdo
      confidence: 0.89
      user_added: false
      user_modified: false

  # ── TASK RECOMMENDATIONS ───────────────────────────────────
  tasks:
    # Commander tasks
    - name: new-offer-pipeline
      agent: commander
      description: "Pipeline completo: do zero à oferta pronta para tráfego"
      entrada: [niche, persona, price_point, product_type]
      saida: [offer-thesis, product-blueprint, sales-copy, creatives, funnel-spec, campaign-plan]
      phases: [intelligence, product, copy, creative, funnel, traffic]
      confidence: 0.95

    - name: audit-existing
      agent: commander
      description: "Auditoria completa de materiais existentes com diagnóstico"
      entrada: [materials_path, current_metrics]
      saida: [audit-report, optimization-priorities]
      confidence: 0.93

    # Intelligence tasks
    - name: define-offer-thesis
      agent: intel-chief
      description: "Sintetizar pesquisa em tese da oferta validada"
      entrada: [niche, persona, research-data, competitor-data]
      saida: [offer-thesis.md]
      confidence: 0.92

    - name: mine-audience-pain
      agent: research-miner
      description: "Minerar dores e desejos em fontes públicas"
      entrada: [niche, persona, sources]
      saida: [pains.md, desires.md, language-patterns.md]
      confidence: 0.90

    - name: analyze-competition
      agent: competitor-analyst
      description: "Análise competitiva completa com swipe file"
      entrada: [niche, competitor_urls]
      saida: [competitor-analysis.md, swipe-file/]
      confidence: 0.89

    # Copy tasks
    - name: write-sales-letter
      agent: copywriter
      description: "Carta de vendas completa baseada na tese"
      entrada: [offer-thesis, product-blueprint, voice-guide]
      saida: [sales-letter.md]
      confidence: 0.93

    - name: generate-hooks
      agent: hook-master
      description: "Gerar variações de ganchos para a persona"
      entrada: [offer-thesis, persona, angle-type, qty]
      saida: [hooks.md]
      confidence: 0.92

    - name: write-vsl-script
      agent: script-writer
      description: "Roteiro de VSL completo"
      entrada: [offer-thesis, product-blueprint, hooks]
      saida: [vsl-script.md]
      confidence: 0.90

    # Creative tasks
    - name: create-ad-creatives
      agent: creative-director
      description: "Briefings e prompts para criativos de ads"
      entrada: [hooks, scripts, visual-identity]
      saida: [creative-briefs/, ad-prompts/]
      confidence: 0.88

    # Funnel tasks
    - name: design-funnel-architecture
      agent: funnel-chief
      description: "Arquitetura completa do funil de vendas"
      entrada: [offer-thesis, product-blueprint, sales-copy]
      saida: [funnel-architecture.md, page-specs/]
      confidence: 0.91

    - name: build-quiz-funnel
      agent: quiz-builder
      description: "Quiz funnel com lógica condicional"
      entrada: [persona, segmentation-rules, quiz-copy]
      saida: [quiz-spec.md, quiz-logic.yaml]
      confidence: 0.87

    # Traffic tasks
    - name: create-media-plan
      agent: traffic-head
      description: "Plano de mídia com orçamento e CPA targets"
      entrada: [product-price, target-cpa, platforms]
      saida: [media-plan.md, budget-allocation.yaml]
      confidence: 0.91

    - name: structure-campaigns
      agent: media-buyer
      description: "Estruturar campanhas de teste"
      entrada: [media-plan, creatives, audiences]
      saida: [campaign-structure.md, audiences.md]
      confidence: 0.90

    # Product tasks
    - name: design-product-structure
      agent: product-architect
      description: "Estruturar produto e entregável"
      entrada: [niche, offer-thesis, format-preference]
      saida: [product-blueprint.md, content-outline.md]
      confidence: 0.89

  template: custom
  config_mode: extend

# ── WORKFLOW DEFINITIONS ───────────────────────────────────
workflows:
  new-offer:
    name: "New Offer Pipeline"
    description: "Pipeline completo do zero à oferta pronta"
    trigger: "*new-offer"
    phases:
      - phase: 1-intelligence
        agents: [intel-chief, research-miner, competitor-analyst]
        output: offer-thesis.md
        approval: true
      - phase: 2-product
        agents: [product-architect]
        output: product-blueprint.md
        approval: true
      - phase: 3-copy
        agents: [copy-chief, copywriter, hook-master, script-writer]
        output: [sales-letter.md, hooks.md, scripts/]
        approval: true
      - phase: 4-creative
        agents: [creative-director]
        output: [creative-briefs/, ad-prompts/]
        approval: true
      - phase: 5-funnel
        agents: [funnel-chief, funnel-engineer, quiz-builder]
        output: [funnel-architecture.md, page-specs/]
        approval: true
      - phase: 6-traffic
        agents: [traffic-head, media-buyer, metrics-analyst]
        output: [media-plan.md, campaign-structure.md]
        approval: true

  audit:
    name: "Audit Existing Materials"
    description: "Análise paralela de materiais existentes"
    trigger: "*audit"
    phases:
      - phase: 1-parallel-analysis
        agents: [intel-chief, copy-chief, creative-director, traffic-head, funnel-chief]
        parallel: true
        output: audit-report.md
        approval: true
      - phase: 2-optimization
        agents: [commander]
        output: optimization-priorities.md
        approval: true

# ── METADATA ─────────────────────────────────────────────
metadata:
  created_at: "2026-02-25T00:00:00Z"
  created_by: "@squad-creator (Craft)"
  source_docs: ["user-verbal-description"]
  user_adjustments: 0
  overall_confidence: 0.91
  total_agents: 16
  total_departments: 6
  total_tasks: 13
  total_workflows: 2
