# Squad Design Blueprint — Zero Diastasis
# Generated by @squad-creator (Craft) on 2026-03-02
# Source: docs/BRIEFING-AIOS-SQUAD-ZERO-DIASTASE.md

squad:
  name: zero-diastasis
  description: "Squad para construção da plataforma de entrega Zero Diastasis™ — protocolo digital de 28 dias para recuperação abdominal pós-parto, mercado LATAM hispânico"
  domain: digital-product-delivery-health
  version: "1.0.0"

analysis:
  entities:
    - User/Member (Sofia — compradora, mãe 28-42 anos, LATAM)
    - Protocol (protocolo 28 dias, 4 módulos)
    - Module (Desbloqueio, Reposicionamento, Compressão, Ancoragem)
    - DailySession (áudio-guia + PDF acompanhamento)
    - Bonus (Stack 360°, Vacuum Master, Tracker 28 Dias)
    - Progress (medidas, fotos, sintomas, gráfico)
    - Product/Upsell (Receitas $4, Aceleração $9, Reset Postural $29)
    - Notification (lembretes diários email/push)
  workflows:
    - user-onboarding
    - daily-protocol-delivery
    - progress-tracking
    - bonus-unlock
    - contextual-upsell
    - content-creation
    - notification-nurture
  integrations:
    - Auth (Magic Link / Social Login)
    - Payment Gateway (LastLink/Hotmart — read-only, já existente)
    - Email Service (ActiveCampaign/Mailchimp)
    - CDN (áudios + PDFs)
    - Analytics (GA4 + Meta Pixel)
    - Push Notifications (Web Push / PWA)
  stakeholders:
    - Sofia (persona — mãe latina 28-42, classe média urbana)
    - Founders (Lucas & Pedro/Cabral)
    - Content Team (PDFs, áudios, vídeos)

recommendations:
  agents:
    # Agent 1: Content Architect
    - id: content-architect
      name: Elena
      icon: "📐"
      role: "Arquiteta de conteúdo do protocolo — estrutura módulos, roteiros de áudio, e-books e materiais"
      archetype: Strategist
      style: "Empática, estruturada, especialista em design instrucional para saúde feminina"
      commands:
        - "*create-module"
        - "*write-audio-script"
        - "*create-ebook"
        - "*create-bonus"
        - "*review-content"
      focus_areas:
        - Estruturação dos 4 módulos do protocolo
        - Scripts de 28 áudio-guias em espanhol neutro
        - Conteúdo dos e-books e guias dia-a-dia
        - Conteúdo dos bônus
        - Consistência de tom empático com persona Sofia
      confidence: 0.95
      user_added: false
      user_modified: false

    # Agent 2: Platform Developer
    - id: platform-dev
      name: Marco
      icon: "💻"
      role: "Desenvolvedor fullstack — site de membros Next.js, player de áudio, drip content, PWA"
      archetype: Builder
      style: "Pragmático, mobile-first, focado em performance e UX"
      commands:
        - "*setup-project"
        - "*create-page"
        - "*implement-feature"
        - "*add-integration"
        - "*build"
      focus_areas:
        - Site Next.js mobile-first com SSR
        - Dashboard personalizada com sessão do dia
        - Player HTML5 de áudio integrado
        - Sistema de drip content (1 dia por vez)
        - Auth magic link
        - PWA com suporte offline
        - Integração GA4 + Meta Pixel
      confidence: 0.94
      user_added: false
      user_modified: false

    # Agent 3: UX Designer
    - id: ux-designer
      name: Valentina
      icon: "🎨"
      role: "Designer UX/UI — experiência mobile-first acolhedora, design system, layouts de PDF"
      archetype: Creator
      style: "Visual, minimalista, inspirada em wellness apps (BetterMe, Noom, Calm)"
      commands:
        - "*design-system"
        - "*create-wireframe"
        - "*design-page"
        - "*review-ux"
        - "*create-pdf-layout"
      focus_areas:
        - Design system (rosa-antigo, nude, branco, dourado)
        - Wireframes mobile-first de todas as telas
        - Templates de layout para PDFs diagramados
        - Ilustrações de exercícios (mulher latina)
        - Celebrações visuais (confetti, badges)
        - Zero overwhelm — 1 ação por dia
      confidence: 0.92
      user_added: false
      user_modified: false

    # Agent 4: Growth Strategist
    - id: growth-strategist
      name: Camila
      icon: "📈"
      role: "Estrategista de retenção e LTV — upsells contextuais, gamificação, referral, email nurture"
      archetype: Optimizer
      style: "Data-driven, criativa, focada em lifetime value e redução de reembolso"
      commands:
        - "*plan-upsells"
        - "*create-email-sequence"
        - "*setup-referral"
        - "*plan-gamification"
        - "*analyze-retention"
      focus_areas:
        - Mapa de upsells contextuais por dia do protocolo
        - Sequência de 28+ emails pós-compra
        - Sistema de gamificação (badges, streaks, unlock)
        - Programa de referral via WhatsApp
        - Formulário de resultado no dia 28
        - Estratégias de redução de reembolso
      confidence: 0.88
      user_added: false
      user_modified: false

    # Agent 5: Localization Lead
    - id: localization-lead
      name: Isabel
      icon: "🌎"
      role: "Líder de localização — espanhol neutro LATAM, compliance de saúde, documentos legais"
      archetype: Guardian
      style: "Precisa, culturalmente sensível, focada em compliance e autenticidade"
      commands:
        - "*review-copy"
        - "*check-compliance"
        - "*localize"
        - "*create-legal-docs"
      focus_areas:
        - Guia de espanhol neutro (tú, não vos, sem modismos regionais)
        - Compliance médica (nunca "cura", "tratamento", "terapia")
        - Tom de voz empático e firme
        - Termos de Uso e Política de Privacidade em espanhol
        - Disclaimers em todos os materiais
        - Localização pt-BR (fase 2)
      confidence: 0.85
      user_added: false
      user_modified: false

  tasks:
    # ── content-architect tasks ──
    - name: create-module-structure
      agent: content-architect
      entrada:
        - briefing
        - module_number (1-4)
        - days_range
      saida:
        - module_structure (tópicos, progressão, duração por dia)
      confidence: 0.95

    - name: write-audio-script
      agent: content-architect
      entrada:
        - module_number
        - day_number
        - exercises_for_day
      saida:
        - audio_script (intro 30s, aquecimento 1-2min, exercícios guiados, cooldown 1min, motivação 30s)
        - duration_estimate
      confidence: 0.93

    - name: create-ebook-content
      agent: content-architect
      entrada:
        - module_1_briefing
        - scientific_base (Dr. Caufriez, TVA, hipopressivos)
      saida:
        - ebook_content (15-20 páginas: educação diástase, TVA, mitos, auto-teste)
      confidence: 0.92

    - name: create-daily-guide
      agent: content-architect
      entrada:
        - module_number
        - exercises_list
        - illustration_refs
      saida:
        - daily_guide_content (8-12 páginas: instruções passo-a-passo)
      confidence: 0.91

    - name: create-bonus-content
      agent: content-architect
      entrada:
        - bonus_id (stack360 | vacuum | tracker | recipes)
      saida:
        - bonus_content (PDF completo do bônus)
      confidence: 0.90

    - name: review-content-compliance
      agent: content-architect
      entrada:
        - content_material (any)
      saida:
        - review_report (tom, compliance médica, consistência persona Sofia)
      confidence: 0.88

    # ── platform-dev tasks ──
    - name: setup-nextjs-project
      agent: platform-dev
      entrada:
        - tech_stack_config
        - design_system_tokens
      saida:
        - project_scaffold (Next.js + Tailwind + PWA + i18n es/pt)
      confidence: 0.95

    - name: implement-auth
      agent: platform-dev
      entrada:
        - auth_strategy (magic_link)
      saida:
        - auth_flow (email + magic link, session management)
      confidence: 0.93

    - name: implement-dashboard
      agent: platform-dev
      entrada:
        - design_wireframe
        - user_data_model
      saida:
        - dashboard_page (saudação, card sessão do dia, barra progresso, micro-motivação)
      confidence: 0.94

    - name: implement-audio-player
      agent: platform-dev
      entrada:
        - audio_files_spec
        - ux_requirements
      saida:
        - audio_player_component (HTML5, play/pause, velocidade, timer, mobile)
      confidence: 0.92

    - name: implement-drip-content
      agent: platform-dev
      entrada:
        - module_structure
        - unlock_rules
      saida:
        - drip_system (liberação dia-a-dia, cadeados visuais, unlock por progresso)
      confidence: 0.91

    - name: implement-progress-tracker
      agent: platform-dev
      entrada:
        - tracking_requirements
      saida:
        - tracker_feature (medidas, upload fotos, diário sintomas, gráfico visual)
      confidence: 0.89

    - name: implement-bonus-section
      agent: platform-dev
      entrada:
        - bonus_list
        - unlock_rules
      saida:
        - bonus_section (downloads + desbloqueio progressivo)
      confidence: 0.90

    - name: implement-upsell-engine
      agent: platform-dev
      entrada:
        - upsell_rules_by_day
      saida:
        - upsell_engine (ofertas contextuais + seção Loja)
      confidence: 0.87

    - name: setup-pwa-offline
      agent: platform-dev
      entrada:
        - content_assets_list
      saida:
        - pwa_config (manifest, service worker, cache strategy áudios/PDFs)
      confidence: 0.88

    # ── ux-designer tasks ──
    - name: create-design-system
      agent: ux-designer
      entrada:
        - color_palette (rosa-antigo #D4A5A5, nude #F5E6D3, dourado #C9A96E, fundo #FFFAF5, texto #2D2D2D)
        - typography (Playfair Display titles, Inter body)
        - references (BetterMe, Noom, Calm)
      saida:
        - design_tokens
        - component_library_spec
        - style_guide
      confidence: 0.94

    - name: design-mobile-wireframes
      agent: ux-designer
      entrada:
        - navigation_structure
      saida:
        - wireframes (dashboard, protocolo, bônus, evolução, loja, perfil)
      confidence: 0.93

    - name: design-pdf-templates
      agent: ux-designer
      entrada:
        - design_system
        - content_type (ebook | daily_guide | bonus | tracker)
      saida:
        - pdf_layout_templates
      confidence: 0.90

    - name: create-exercise-illustrations
      agent: ux-designer
      entrada:
        - exercises_by_module
      saida:
        - illustration_specs (prompts IA ou specs vetoriais, mulher latina, ambiente doméstico)
      confidence: 0.87

    - name: design-celebrations
      agent: ux-designer
      entrada:
        - milestones (dia 7, 14, 21, 28)
      saida:
        - celebration_designs (confetti, badges, mensagens motivacionais)
      confidence: 0.85

    # ── growth-strategist tasks ──
    - name: map-contextual-upsells
      agent: growth-strategist
      entrada:
        - value_ladder (products + prices)
        - protocol_days (1-28)
      saida:
        - upsell_map (dia → oferta → copy espanhol → CTA)
      confidence: 0.90

    - name: create-email-sequence
      agent: growth-strategist
      entrada:
        - protocol_28_days
        - upsell_map
      saida:
        - email_sequence (28+ emails: check-ins, ofertas, depoimento, celebração)
      confidence: 0.89

    - name: plan-gamification
      agent: growth-strategist
      entrada:
        - milestones
        - bonus_unlock_rules
      saida:
        - gamification_system (badges, unlock progressivo, streaks, formulário dia 28)
      confidence: 0.87

    - name: setup-referral-program
      agent: growth-strategist
      entrada:
        - incentives
        - whatsapp_mechanics
      saida:
        - referral_program (share WhatsApp, descontos, tracking)
      confidence: 0.83

    # ── localization-lead tasks ──
    - name: create-copy-guidelines
      agent: localization-lead
      entrada:
        - persona_sofia_briefing
        - target_countries (CO, MX, PR, CL, AR)
      saida:
        - copy_guidelines (espanhol neutro, termos permitidos/proibidos, tom de voz)
      confidence: 0.92

    - name: review-compliance
      agent: localization-lead
      entrada:
        - health_material (any)
      saida:
        - compliance_report (claims médicos, disclaimers, termos legais)
      confidence: 0.90

    - name: create-legal-docs
      agent: localization-lead
      entrada:
        - jurisdictions (LATAM)
        - business_model
      saida:
        - legal_docs (Política de Privacidade + Termos de Uso em espanhol)
      confidence: 0.86

    - name: localize-content
      agent: localization-lead
      entrada:
        - source_content (any language)
        - target_locale (es-LATAM | pt-BR)
      saida:
        - localized_content
      confidence: 0.85

  template: custom
  config_mode: extend

config:
  tech_stack:
    framework: Next.js (SSR)
    styling: Tailwind CSS
    hosting: Vercel
    auth: Magic Link (email)
    payments: LastLink/Hotmart (external, read-only)
    email: ActiveCampaign or Mailchimp
    audio: HTML5 native player
    cdn: Vercel Edge / CloudFront
    analytics: GA4 + Meta Pixel
    pwa: true
  design:
    palette:
      primary: "#D4A5A5"    # Rosa-antigo / Blush
      secondary: "#F5E6D3"  # Nude / Bege claro
      accent: "#C9A96E"     # Dourado suave
      background: "#FFFAF5" # Branco quente
      text: "#2D2D2D"       # Cinza escuro
    typography:
      headings: "Playfair Display"
      body: "Inter"
    approach: mobile-first
    references:
      - BetterMe
      - Noom
      - Calm
  locale:
    primary: es-LATAM (espanhol neutro)
    secondary: pt-BR (fase 2)
    countries_priority:
      - CO (Colômbia)
      - MX (México)
      - PR (Porto Rico)
      - CL (Chile)
      - AR (Argentina)
  compliance:
    never_use:
      - cura
      - tratamiento
      - terapia
      - curar
    always_use:
      - protocolo de bienestar
      - recuperación
      - reactivación
      - reducción de medidas
    disclaimer: "Resultados varían. Este protocolo no sustituye atención médica profesional."
    guarantee: 28 días

priorities:
  p1_mvp:
    - Site de entrega funcional (mobile-first, player de áudio)
    - E-book Módulo 1 (PDF diagramado)
    - Guias dia-a-dia Módulos 2, 3, 4 (PDFs)
    - Scripts dos áudio-guias (28 dias, espanhol neutro)
    - Tracker 28 dias (PDF imprimível)
    - Bônus Stack 360° (PDF)
    - Bônus Vacuum Master (PDF)
  p2_post_launch:
    - Pack de Receitas Anti-Inflamatórias (PDF)
    - Vídeo de boas-vindas
    - Vídeos demo exercícios
    - Sequência de emails pós-compra (28 dias)
    - Sistema de notificação/lembrete diário
  p3_scale:
    - Blog com artigos SEO
    - Comunidade integrada
    - Referral program
    - Versão pt-BR
    - PWA / app-like experience

